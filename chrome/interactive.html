<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=0, viewport-fit=cover">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>img6532.jpeg</title>
    <style>
      * {
        box-sizing: border-box;
        font-family: Roboto;
      }

      body {
        margin: 0;
        overflow: hidden;
      }

      #preview {
        &.hidden {
          display: none;
        }
      }

      #content {
        background-image: url(./all.png);
        background-size: cover;
        background-position: top center;
        background-repeat: no-repeat;
        height: 100vh;
        width: 540px;
        flex-direction: column;
        justify-content: space-between;
      }

      #status {
        height: 34px;
        background: #faf8fe;
        display: flex;
        padding-left: 21px;
        padding-right: 33px;

        & #clock {
          font-style: normal;
          font-size: 18.5px;
          line-height: 30px;
          font-weight: 330;
        }

        & i {
          display: block;
          background-size: cover;
          background-repeat: no-repeat;
          background-position: center center;
          width: 22px;
          height: 22px;
          margin: 4px;
        }

        & #cellular {
          background-image: url(./cellular.svg);
        }

        & #wifi {
          background-image: url(./wifi.svg);
        }

        & #battery {
          background-image: url(./battery.svg);
          width: 36px;
          margin: 3px;
        }

        & span {
          flex-grow: 1;
        }
      }

      #toolbar {
        display: flex;
        border-bottom: 2px solid #e1e2ed;
        background: #faf8fe;
        height: 72px;

        input {
          appearance: none;
          border: 0;
          outline: 0;
          padding: 0;
          height: 54px;
          margin: 8px 0;
          border-radius: 28px;
          width: 32px;
          flex-grow: 1;
          background: #e5e5f0;
          background-position: 12px center;
          background-repeat: no-repeat;
          background-size: 22px;
          background-image: url(./tune.svg);
          padding-left: 42px;
          padding-right: 8px;
          font-size: 22px;
          font-weight: 300;
        }

        & i {
          display: block;
          background-size: cover;
          background-repeat: no-repeat;
          background-position: center center;
          width: 32px;
          height: 32px;
          margin: 18px 16px;
        }

        & #home {
          background-image: url(./home.svg);
          background-size: 80%;
        }

        & #plus {
          background-image: url(./plus.svg);
        }

        & #tab {
          background-image: url(./tab.svg);
          text-align: center;
          font-size: 16px;
          font-weight: 440;
          line-height: 34px;
          font-style: normal;
          padding-left: 1px;
        }

        & #menu {
          background-image: url(./menu.svg);
        }
      }
    </style>
    <script>
      function add() {
        document.getElementById("pin").value += "x";
      }

      function subtract() {
        const pin = document.getElementById("pin");
        pin.value = pin.value.slice(1);
      }

      function goFullscreen() {
        document.getElementById('preview').classList.add("hidden");
        document.getElementById('content').classList.remove("hidden");
        document.documentElement.requestFullscreen();
      }
    </script>
  </head>
  <body onload="goFullscreen()">
    <div id="preview">
      <button onclick="goFullscreen()">Harmless Button</button>
    </div>
    <div id="content" class="hidden">
      <div id="status">
        <b id="clock">9:40</b>
        <span></span>
        <i id="cellular"></i>
        <i id="wifi"></i>
        <i id="battery"></i>
      </div>
      <div id="toolbar">
        <i id="home"></i>
        <input type="text" value="accounts.google.com/v3/signin/identifier"/>
        <i id="plus"></i>
        <i id="tab">1</i>
        <i id="menu"></i>
      </div>
    </div>
  </body>
</html>
